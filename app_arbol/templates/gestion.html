{% extends 'base.html' %}

{% block content %}

<h2>🛠️ Panel de Gestión</h2>

<div class="hero-boxes">

    <div class="hero-card">

        <h3>📋 Estado General</h3>

        <p>📌 Reclamos Pendientes: 3</p>

        <p>🚨 Prioridad Alta: 1</p>

        <button class="btn-atender" onclick="mostrarMensaje()">
            Atender Reclamo
        </button>

        <p id="mensaje-atencion" class="mensaje-ok"></p>

    </div>

    <div class="hero-card">

        <h3>🔄 Flujo de Atención</h3>

        <p>1️⃣ Recepción del reclamo</p>

        <p>2️⃣ Clasificación por categoría</p>

        <p>3️⃣ Atención institucional</p>

        <p>4️⃣ Resolución del caso</p>

    </div>

</div>

<script>

function mostrarMensaje() {

    document.getElementById("mensaje-atencion").innerHTML =
    "✅ Reclamo enviado al área correspondiente";

}

</script>

{% endblock %}
