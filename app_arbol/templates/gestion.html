{% extends 'base.html' %}

{% block content %}

<h2>🛠️ Panel de Gestión</h2>

<div class="hero-boxes">

    <div class="hero-card">

        <h3>📋 Estado General</h3>

        <p>📌 Reclamos Pendientes: 3</p>
        <p>🚨 Prioridad Alta: 1</p>

        <form method="POST" action="/eliminar/">
            {% csrf_token %}

            <input type="text" name="nombre" placeholder="Nombre del reclamo" required>

            <button type="submit">
                Atender / Eliminar
            </button>
        </form>

    </div>
</div>

{% if mensaje %}
    <p class="mensaje">{{ mensaje }}</p>
{% endif %}

{% endblock %}
